<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Chart</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#d0d4d8; padding:16px; font-size:11px; }
.page { background:#fff; margin:0 auto; border:2px solid #2c3e50; box-shadow:0 2px 12px rgba(0,0,0,0.18); width:max-content; min-width:100%; }

#top-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 10px; background:#f8f9fa; border-bottom:1px solid #e0e0e0; min-height:32px;
}
#status-bar { font-size:9px; color:#888; font-style:italic; }
#status-bar.err { color:#c00; font-weight:bold; font-style:normal; }

/* Button group top-right */
.btn-group { display:flex; align-items:center; gap:8px; }

.top-btn {
  display:none;
  align-items:center; gap:5px;
  border:none; border-radius:4px;
  padding:5px 12px; font-size:10px; font-weight:bold;
  cursor:pointer; letter-spacing:0.3px; transition:background 0.2s;
  color:#fff;
}
.top-btn svg { width:13px; height:13px; fill:#fff; flex-shrink:0; }
.top-btn.green { background:#1e6e42; }
.top-btn.green:hover { background:#155234; }
.top-btn.blue  { background:#2c5f8a; }
.top-btn.blue:hover  { background:#1e4a73; }
.top-btn.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

#loading { padding:60px; text-align:center; font-size:14px; color:#666; }
.title-bar { text-align:center; font-size:14px; font-weight:bold; padding:7px 12px; border-bottom:2px solid #2c3e50; letter-spacing:0.5px; background:#fff; }
.dir-bar { display:grid; grid-template-columns:160px 1fr 160px; border-bottom:2px solid #2c3e50; font-size:10px; background:#f0f4f8; }
.dir-bar > div { padding:3px 8px; }
.dir-l { border-right:1px solid #aaa; font-weight:bold; }
.dir-m { text-align:center; font-weight:bold; font-size:12px; font-style:italic; letter-spacing:3px; }
.dir-r { border-left:1px solid #aaa; text-align:right; font-weight:bold; }
.chart-scroll { overflow-x:auto; }
table { border-collapse:collapse; table-layout:fixed; }
table td, table th { border:1px solid #b0b8c1; text-align:center; vertical-align:middle; padding:0; overflow:hidden; line-height:1.3; }
.cl   { width:160px; min-width:160px; }
.csub { width:32px;  min-width:32px; }
.ch-block { background:linear-gradient(180deg,#2c5f8a 0%,#3a7cbf 100%); font-weight:bold; font-size:11px; color:#fff; height:48px; writing-mode:vertical-lr; transform:rotate(180deg); padding:3px 0; border:1px solid #1e4a73; letter-spacing:0.5px; }
.ch-sub { background:#daeef3; font-size:8px; color:#444; height:16px; padding:1px 0; border:1px solid #9fbfcc; font-weight:bold; }
.ch-label-hd { background:linear-gradient(180deg,#2c5f8a 0%,#3a7cbf 100%); font-weight:bold; font-size:12px; color:#fff; text-align:center; vertical-align:middle; border:1px solid #1e4a73; letter-spacing:0.5px; }
.rl { text-align:left; padding:5px 8px; font-size:10px; font-weight:bold; white-space:normal; word-break:break-word; vertical-align:middle; border:1px solid #aab !important; background:#f7f9fb; line-height:1.4; }
.rl-group { text-align:left; padding:5px 8px; font-size:9.5px; font-weight:bold; white-space:normal; word-break:break-word; vertical-align:middle; line-height:1.4; border:1px solid #aab !important; background:#f0f4f8; }
.emb  { background:#4472C4; color:#fff; }
.etop { background:#70ad47; color:#fff; }
.elvl { background:#92d050; color:#333; }
.emp  { background:#f5f7fa; }
.d { font-size:8px; padding:3px 2px; white-space:normal; word-break:break-word; line-height:1.4; font-weight:bold; height:28px; vertical-align:middle; }
.legend { display:flex; align-items:center; flex-wrap:wrap; gap:12px; padding:7px 12px; border-top:2px solid #2c3e50; font-size:10px; background:#f8f9fa; }
.lg-lbl { font-weight:bold; color:#2c3e50; }
.lg-item { display:flex; align-items:center; gap:5px; font-weight:500; }
.lg-sw { width:32px; height:14px; border:1px solid #666; border-radius:2px; display:inline-block; }
@media print { body{padding:0;background:#fff;} .page{border:1px solid #333;box-shadow:none;} #top-bar,#loading{display:none!important;} }
</style>
</head>
<body>
<div class="page">

  <div id="top-bar">
    <span id="status-bar">Initialising...</span>
    <div class="btn-group">
      <!-- Fetch Now: triggers GitHub Actions workflow_dispatch -->
      <button id="fetch-btn" class="top-btn blue" onclick="fetchNow()">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Fetch Now
      </button>
      <!-- Export to Excel -->
      <button id="export-btn" class="top-btn green" onclick="exportExcel()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zm-2 4h-2v2H8v-2H6v-1l3-3 3 3v1zm0 3H8v3h4v-3z"/></svg>
        Export to Excel
      </button>
    </div>
  </div>

  <div class="title-bar" id="title-bar">Loading...</div>
  <div class="dir-bar">
    <div class="dir-l" id="dir-left"></div>
    <div class="dir-m">&#8592; &nbsp; MAIN CARRIAGE WAY &nbsp; &#8594;</div>
    <div class="dir-r" id="dir-right"></div>
  </div>
  <div class="chart-scroll">
    <div id="loading">&#9203; &nbsp; Loading layer chart data...</div>
    <table id="chart-table" style="display:none;">
      <colgroup id="colgroup"><col class="cl"></colgroup>
      <thead id="chart-head"></thead>
      <tbody id="chart-body"></tbody>
    </table>
  </div>
  <div class="legend" id="legend">
    <span class="lg-lbl">Colour Code &#8594;</span>
  </div>
</div>

<script>
const REPO_BASE = 'https://hathi-jigar.github.io/support-dashboard';
const URLS = {
  j1: REPO_BASE + '/data/j1.json',
  j2: REPO_BASE + '/data/j2.json',
  j3: REPO_BASE + '/data/j3.json',
  j4: REPO_BASE + '/data/j4.json',
};
const ARR = '\u2192';

// GitHub repo details for workflow_dispatch trigger
const GH_OWNER    = 'Hathi-Jigar';
const GH_REPO     = 'support-dashboard';
const GH_WORKFLOW = 'fetch-layer-chart-data.yml';
// Personal Access Token with repo/actions:write scope
// Create at: https://github.com/settings/tokens
// Paste your token below (fine-grained PAT, Actions: read & write)
const GH_TOKEN    = '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';

const CLS_FILL = {
  emb:  'FF4472C4', etop: 'FF70AD47', elvl: 'FF92D050', emp: 'FFF5F7FA',
};
const ALL_COLOURS = [
  { key:'emb',  label:'EMB Layer',     hex:'#4472C4' },
  { key:'etop', label:'EMB Top',       hex:'#70ad47' },
  { key:'elvl', label:'EMB Top Level', hex:'#92d050' },
  { key:'sg',   label:'SG Layer',      hex:'#00B050' },
  { key:'gsb',  label:'GSB',           hex:'#FFFF00', border:'#aaa' },
  { key:'wmm',  label:'WMM',           hex:'#FF6600' },
  { key:'dbm',  label:'DBM',           hex:'#00B0F0' },
  { key:'bc',   label:'BC',            hex:'#FF99CC' },
];

let excelData=[], excelTitle='', excelChFrom=0, excelChTo=0, excelTOTAL=0, excelSUB=10;

function parseCh(s) {
  if (!s) return null;
  const c=String(s).replace(/\s+/g,'');
  const m=c.match(/^(\d+)\+(\d+)$/);
  if (m) return parseInt(m[1])*1000+parseInt(m[2]);
  return null;
}
function extractRange(s) {
  if (!s) return null;
  const m=s.match(/(\d[\d\s]*\+\s*[\d]+)\s+to\s+(\d[\d\s]*\+\s*[\d]+)/i);
  if (!m) return null;
  const f=parseCh(m[1]),t=parseCh(m[2]);
  return (f!==null&&t!==null)?{from:f,to:t}:null;
}
function fmtCh(m) {
  return String(Math.floor(m/1000)).padStart(3,'0')+'+'+String(m%1000).padStart(3,'0');
}
function fmtDate(s) {
  if (!s) return '';
  const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
             Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const m=s.match(/(\d{1,2})\s+([A-Za-z]{3})[,\s]+(2\d{3})/);
  if (m) return m[1].padStart(2,'0')+'-'+(mo[m[2]]||'??')+'-'+m[3].slice(2);
  return s;
}
function cellLabel(rfi) { return rfi ? rfi.rfiDate+' / '+rfi.rfiNum : ''; }

function buildRowCells(colRanges,TOTAL,chartFrom,SUB) {
  const blocks=[];
  for (const rng of colRanges) {
    const f=Math.max(rng.from,chartFrom), t=Math.min(rng.to,chartFrom+TOTAL*SUB);
    if (f>=t) continue;
    const s=Math.round((f-chartFrom)/SUB), e=Math.round((t-chartFrom)/SUB);
    if (e>s) blocks.push({s,e,cls:rng.cls,content:rng.content||''});
  }
  blocks.sort((a,b)=>a.s-b.s);
  let html='',col=0;
  for (const blk of blocks) {
    while (col<blk.s){html+='<td class="emp d"></td>';col++;}
    const span=blk.e-blk.s, sp=span>1?' colspan="'+span+'"':'';
    html+='<td class="'+blk.cls+' d"'+sp+'>'+blk.content+'</td>';
    col=blk.e;
  }
  while (col<TOTAL){html+='<td class="emp d"></td>';col++;}
  return html;
}
function buildCellArray(colRanges,TOTAL,chartFrom,SUB) {
  const arr=Array(TOTAL).fill(null).map(()=>({content:'',cls:'emp'}));
  for (const rng of colRanges) {
    const f=Math.max(rng.from,chartFrom), t=Math.min(rng.to,chartFrom+TOTAL*SUB);
    if (f>=t) continue;
    const s=Math.round((f-chartFrom)/SUB), e=Math.round((t-chartFrom)/SUB);
    for (let i=s;i<e&&i<TOTAL;i++) arr[i]={content:rng.content||'',cls:rng.cls};
  }
  return arr;
}

// ── FETCH NOW — triggers GitHub Actions workflow_dispatch ──
async function fetchNow() {
  const btn = document.getElementById('fetch-btn');
  const statusEl = document.getElementById('status-bar');

  if (GH_TOKEN === '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') {
    alert('Please add your GitHub Personal Access Token in the HTML file.\n\nOpen layer_chart_live.html and set GH_TOKEN to your PAT.');
    return;
  }

  btn.classList.add('spinning');
  btn.disabled = true;
  statusEl.textContent = 'Triggering data refresh...';

  try {
    const res = await fetch(
      'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/actions/workflows/' + GH_WORKFLOW + '/dispatches',
      {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + GH_TOKEN,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' })
      }
    );

    if (res.status === 204) {
      statusEl.textContent = 'Refresh triggered \u2014 data will update in ~15 seconds...';
      // Wait 15 seconds then reload chart data from GitHub Pages
      setTimeout(() => {
        main();
      }, 15000);
    } else {
      const err = await res.text();
      statusEl.textContent = 'Trigger failed: ' + res.status;
      console.error(err);
    }
  } catch (e) {
    statusEl.textContent = 'Trigger failed: ' + e.message;
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}

// ── EXCEL EXPORT ──────────────────────────────────────────
function exportExcel() {
  if (!excelData.length) return;
  const wb=XLSX.utils.book_new(), wsData=[];
  wsData.push([excelTitle]);
  wsData.push([]);
  const SUBS=10, hdr1=['CHAINAGE'];
  for (let b=1;b<=(excelTOTAL/SUBS);b++){hdr1.push(((excelChFrom+b*100)/1000).toFixed(3));for(let s=1;s<SUBS;s++)hdr1.push('');}
  wsData.push(hdr1);
  const hdr2=[''];
  for (let b=0;b<excelTOTAL/SUBS;b++) for(let s=1;s<=SUBS;s++) hdr2.push(s*excelSUB);
  wsData.push(hdr2);
  for (const row of excelData){const r=[row.rowLabel];for(const c of row.cells)r.push(c.content);wsData.push(r);}
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:28}];
  for(let i=0;i<excelTOTAL;i++) ws['!cols'].push({wch:10});
  const totalCols=excelTOTAL+1;
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:totalCols-1}}];
  let mc=1;
  for(let b=0;b<excelTOTAL/SUBS;b++){ws['!merges'].push({s:{r:2,c:mc},e:{r:2,c:mc+SUBS-1}});mc+=SUBS;}
  const BORDER={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};
  function addr(r,c){return XLSX.utils.encode_cell({r,c});}
  if(ws[addr(0,0)]) ws[addr(0,0)].s={fill:{patternType:'solid',fgColor:{rgb:'1E2D3D'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:13},alignment:{horizontal:'center'},border:BORDER};
  for(let c=0;c<totalCols;c++){const cell=ws[addr(2,c)];if(cell)cell.s={fill:{patternType:'solid',fgColor:{rgb:'2C5F8A'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:10},alignment:{horizontal:'center'},border:BORDER};}
  for(let c=0;c<totalCols;c++){const cell=ws[addr(3,c)];if(cell)cell.s={fill:{patternType:'solid',fgColor:{rgb:'DAEEF3'}},font:{bold:true,sz:8},alignment:{horizontal:'center'},border:BORDER};}
  for(let ri=0;ri<excelData.length;ri++){
    const row=excelData[ri], er=4+ri;
    const lc=ws[addr(er,0)];
    if(lc)lc.s={fill:{patternType:'solid',fgColor:{rgb:'F0F4F8'}},font:{bold:true,sz:9},alignment:{horizontal:'left',vertical:'center',wrapText:true},border:BORDER};
    for(let ci=0;ci<row.cells.length;ci++){
      const cell=ws[addr(er,ci+1)];if(!cell)continue;
      const clsKey=row.cells[ci].cls, fg=(CLS_FILL[clsKey]||'FFF5F7FA').replace(/^FF/,'');
      cell.s={fill:{patternType:'solid',fgColor:{rgb:fg}},font:{bold:!!cell.v,sz:8,color:{rgb:clsKey!=='emp'?'FFFFFF':'333333'}},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:BORDER};
    }
  }
  XLSX.utils.book_append_sheet(wb,ws,'Layer Chart');
  XLSX.writeFile(wb,'LayerChart_'+fmtCh(excelChFrom)+'_'+fmtCh(excelChTo)+'_RHS.xlsx');
}

// ── MAIN ─────────────────────────────────────────────────
async function main() {
  const statusEl=document.getElementById('status-bar');
  const loadingEl=document.getElementById('loading');
  const tableEl=document.getElementById('chart-table');
  const exportBtn=document.getElementById('export-btn');
  const fetchBtn=document.getElementById('fetch-btn');

  try {
    statusEl.textContent='Fetching data...';
    const [j1,j2,j3,j4]=await Promise.all(
      Object.values(URLS).map(u=>fetch(u+'?t='+Date.now()).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}))
    );
    statusEl.textContent='Building chart...';

    const level2ByParent={};
    for (const r of j2.filter(r=>r['Level']==='2'&&r['Is Active']==='true')) {
      const pid=r['Parent Level ID'];
      if(!level2ByParent[pid])level2ByParent[pid]=[];
      level2ByParent[pid].push(r);
    }
    for(const pid in level2ByParent)
      level2ByParent[pid].sort((a,b)=>parseInt(a['Order'])-parseInt(b['Order']));

    let chartFrom=Infinity,chartTo=-Infinity;
    for(const r of j2.filter(r=>r['Level']==='2')){
      const rng=extractRange(r['Name']);
      if(rng){chartFrom=Math.min(chartFrom,rng.from);chartTo=Math.max(chartTo,rng.to);}
    }
    if(!isFinite(chartFrom)){chartFrom=64000;chartTo=65000;}
    const CHART_LEN=chartTo-chartFrom, BLOCK=100, SUB=10;
    const NUM_BLOCKS=CHART_LEN/BLOCK, SUBS=BLOCK/SUB, TOTAL=NUM_BLOCKS*SUBS;

    excelChFrom=chartFrom;excelChTo=chartTo;excelTOTAL=TOTAL;excelSUB=SUB;
    excelTitle='{ LAYER CHART   Ch :-   '+fmtCh(chartFrom)+'   To   '+fmtCh(chartTo)+'   SIDE :-   RHS }';
    excelData=[];

    document.getElementById('title-bar').textContent=excelTitle;
    document.getElementById('dir-left').textContent='Meerut \u2192';
    document.getElementById('dir-right').textContent='\u2190 Prayagraj';

    function nomRangesByName(exactName) {
      const parent=j2.find(r=>r['Level']==='1'&&r['Name'].trim().toLowerCase()===exactName.trim().toLowerCase());
      if(!parent)return[];
      return(level2ByParent[parent['ID']]||[]).map(r=>extractRange(r['Name'])).filter(Boolean);
    }

    const K_EQC='Eqc '+ARR+' Eqc Name', K_STAGE='Eqc Stage '+ARR+' Name';
    const rfiMap={};
    for(const r of j4){
      const path=r[K_EQC]||'',stgStr=r[K_STAGE]||'';
      const rfiNum=String(r['Qc Option']||r['ID']), rfiDate=fmtDate(r['Created At']);
      const lm=stgStr.match(/layer\s*(\d+)/i);if(!lm)continue;
      const layerNum=parseInt(lm[1]),rng=extractRange(path);if(!rng)continue;
      const key=rng.from+'_'+rng.to;
      if(!rfiMap[key])rfiMap[key]={};
      rfiMap[key][layerNum]={rfiDate,rfiNum};
    }

    const K_STG='Project Eqc Type Stage '+ARR+' Name', ckById={};
    for(const r of j1){
      const id=String(r['ID']),nm=r['Name'],stg=r[K_STG];
      if(!ckById[id])ckById[id]={name:nm,stages:[]};
      if(stg&&!ckById[id].stages.includes(stg))ckById[id].stages.push(stg);
    }
    for(const id in ckById)
      ckById[id].stages.sort((a,b)=>parseInt(a.match(/\d+/)?.[0]||0)-parseInt(b.match(/\d+/)?.[0]||0));

    const embLevelCks=[],embTopCks=[],embLayerCks=[];
    for(const ck of Object.values(ckById)){
      const nl=ck.name.trim().toLowerCase();
      if(nl==='embank top level')embLevelCks.push(ck);
      else if(nl==='embank top')embTopCks.push(ck);
      else embLayerCks.push(ck);
    }
    embLayerCks.sort((a,b)=>(extractRange(a.name)?.from||0)-(extractRange(b.name)?.from||0));

    const usedClasses=new Set();

    // Rebuild colgroup only on first load (avoid duplicates on refresh)
    const cg=document.getElementById('colgroup');
    if(cg.children.length<=1){
      for(let i=0;i<TOTAL;i++){const c=document.createElement('col');c.className='csub';cg.appendChild(c);}
    }
    let h1='<tr><th class="ch-label-hd" rowspan="2">CHAINAGE</th>';
    for(let b=1;b<=NUM_BLOCKS;b++)
      h1+='<th class="ch-block" colspan="'+SUBS+'">'+ ((chartFrom+b*BLOCK)/1000).toFixed(3)+'</th>';
    h1+='</tr>';
    let h2='<tr>';
    for(let b=0;b<NUM_BLOCKS;b++) for(let s=1;s<=SUBS;s++) h2+='<td class="ch-sub">'+(s*SUB)+'</td>';
    h2+='</tr>';
    document.getElementById('chart-head').innerHTML=h1+h2;

    function renderSimpleRows(cks,cls,nomRanges){
      let html='';
      for(const ck of cks){
        usedClasses.add(cls);
        const ranges=nomRanges.length>0?nomRanges:(extractRange(ck.name)?[extractRange(ck.name)]:[]);
        const stages=[...ck.stages];
        for(let si=0;si<stages.length;si++){
          const layerNum=parseInt(stages[si].match(/\d+/)?.[0]||1);
          const colRanges=ranges.map(nr=>{const key=nr.from+'_'+nr.to,rfi=rfiMap[key]?.[layerNum];return{from:nr.from,to:nr.to,cls,content:cellLabel(rfi)};});
          const rs=stages.length>1&&si===0?' rowspan="'+stages.length+'"':'';
          html+='<tr>'+(si===0?'<td class="rl '+cls+'"'+rs+'>'+ck.name+'</td>':'')+buildRowCells(colRanges,TOTAL,chartFrom,SUB)+'</tr>';
          excelData.push({rowLabel:si===0?ck.name:'',cls,cells:buildCellArray(colRanges,TOTAL,chartFrom,SUB)});
        }
      }
      return html;
    }

    let body='';
    body+=renderSimpleRows(embLevelCks,'elvl',nomRangesByName('Embank Top Level'));
    body+=renderSimpleRows(embTopCks,'etop',nomRangesByName('Embank Top'));

    if(embLayerCks.length>0){
      usedClasses.add('emb');
      const maxLayers=Math.max(...embLayerCks.map(ck=>ck.stages.length));
      for(let row=0;row<maxLayers;row++){
        const colRanges=[];
        for(const ck of embLayerCks){
          const ckRange=extractRange(ck.name);if(!ckRange)continue;
          const layerNum=ck.stages.length-row;if(layerNum<1)continue;
          const key=ckRange.from+'_'+ckRange.to,rfi=rfiMap[key]?.[layerNum];
          colRanges.push({from:ckRange.from,to:ckRange.to,cls:'emb',content:cellLabel(rfi)});
        }
        let tr='<tr>';
        if(row===0)tr+='<td class="rl-group emb" rowspan="'+maxLayers+'">Intermediate layer of<br>Embankment<br>with OGL &amp; C&amp;G</td>';
        tr+=buildRowCells(colRanges,TOTAL,chartFrom,SUB)+'</tr>';
        body+=tr;
        excelData.push({rowLabel:row===0?'Intermediate layer of Embankment with OGL & C&G':'',cls:'emb',cells:buildCellArray(colRanges,TOTAL,chartFrom,SUB)});
      }
    }

    document.getElementById('chart-body').innerHTML=body;

    // Rebuild legend
    const legendEl=document.getElementById('legend');
    legendEl.innerHTML='<span class="lg-lbl">Colour Code &#8594;</span>';
    for(const col of ALL_COLOURS){
      if(usedClasses.has(col.key)){
        const span=document.createElement('span');span.className='lg-item';
        const border=col.border?';border-color:'+col.border:'';
        span.innerHTML='<span class="lg-sw" style="background:'+col.hex+border+';"></span> '+col.label;
        legendEl.appendChild(span);
      }
    }

    loadingEl.style.display='none';
    tableEl.style.display='';
    exportBtn.style.display='flex';
    fetchBtn.style.display='flex';
    statusEl.className='';
    statusEl.textContent='Live data \u2014 Last refreshed: '+new Date().toLocaleTimeString('en-IN')+' (auto-refresh: 1 hr)';

  } catch(err){
    console.error(err);
    loadingEl.innerHTML='<span style="color:#c00;font-size:12px">&#9888; Failed to load: '+err.message+'</span>';
    statusEl.className='err';
    statusEl.textContent='Data unavailable';
  }
}

main();
setInterval(main, 60*60*1000); // auto-refresh every 1 hour
</script>
</body>
</html>
