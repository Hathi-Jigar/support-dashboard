<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Chart</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#e8e8e8; padding:10px; font-size:10px; }
.page { background:#fff; margin:0 auto; border:2px solid #333; width:max-content; min-width:100%; }
#status-bar { text-align:right; font-size:9px; color:#888; font-style:italic; padding:2px 8px; border-bottom:1px solid #ddd; background:#fafafa; min-height:18px; }
#status-bar.err { color:#c00; font-weight:bold; font-style:normal; }
#loading { padding:40px; text-align:center; font-size:13px; color:#555; }
.title-bar { text-align:center; font-size:13px; font-weight:bold; padding:5px 8px; border-bottom:2px solid #333; letter-spacing:0.3px; }
.dir-bar { display:grid; grid-template-columns:100px 1fr 100px; border-bottom:1px solid #333; font-size:10px; }
.dir-bar > div { padding:2px 6px; }
.dir-l { border-right:1px solid #333; }
.dir-m { text-align:center; font-weight:bold; font-size:11px; font-style:italic; letter-spacing:2px; }
.dir-r { border-left:1px solid #333; text-align:right; }
.chart-scroll { overflow-x:auto; }
table { border-collapse:collapse; table-layout:fixed; }

/* Only outer row borders — no internal sub-col borders on data cells */
table td, table th {
  border-left:1px solid #bbb;
  border-right:1px solid #bbb;
  border-top:1px solid #bbb;
  border-bottom:1px solid #bbb;
  text-align:center;
  vertical-align:middle;
  padding:0;
  overflow:hidden;
  line-height:1.15;
}

/* Header cells keep full borders */
.ch-block, .ch-sub, .ch-label-hd {
  border:1px solid #888 !important;
}

/* Data cells: remove internal left/right borders — rely on colspan merge */
td.data-cell {
  border-left: none !important;
  border-right: none !important;
}
/* First and last sub-col of a merged block get the outer border back */
td.data-cell.block-start { border-left:1px solid #888 !important; }
td.data-cell.block-end   { border-right:1px solid #888 !important; }

/* Empty sub-cols inside a coloured range: no border at all */
td.fill { border:none !important; }

.cl { width:140px; min-width:140px; }
.csub { width:22px; min-width:22px; }
.ch-block { background:#BDD7EE; font-weight:bold; font-size:10px; height:40px; writing-mode:vertical-lr; transform:rotate(180deg); padding:2px 0; }
.ch-sub { background:#DAEEF3; font-size:7.5px; color:#333; height:14px; padding:1px 0; }
.ch-label-hd { background:#BDD7EE; font-weight:bold; font-size:10px; text-align:center; vertical-align:middle; }
.rl { text-align:left; padding:2px 4px; font-size:9px; white-space:normal; word-break:break-word; vertical-align:middle; border:1px solid #888 !important; }
.rl-group { text-align:center; font-size:8.5px; white-space:normal; word-break:break-word; vertical-align:middle; padding:3px; line-height:1.3; border:1px solid #888 !important; }

/* Colours */
.emb  { background:#4472C4; color:#fff; }
.etop { background:#92D050; }
.elvl { background:#92D050; }
.emp  { background:#fff; border:none !important; }

/* Data text inside coloured merged cell */
.d { font-size:7.5px; padding:1px 2px; white-space:normal; word-break:break-all; line-height:1.3; }

/* Legend */
.legend { display:flex; align-items:center; flex-wrap:wrap; gap:8px; padding:5px 8px; border-top:2px solid #333; font-size:9.5px; background:#fff; }
.lg-lbl { font-weight:bold; }
.lg-item { display:flex; align-items:center; gap:3px; }
.lg-sw { width:26px; height:13px; border:1px solid #666; display:inline-block; }

@media print { body{padding:0;background:#fff;} .page{border:1px solid #333;} #status-bar,#loading{display:none!important;} }
</style>
</head>
<body>
<div class="page">
  <div id="status-bar">Initialising...</div>
  <div class="title-bar" id="title-bar">Loading...</div>
  <div class="dir-bar">
    <div class="dir-l" id="dir-left"></div>
    <div class="dir-m">&#8592; &nbsp;&nbsp; MAIN CARRIAGE WAY &nbsp;&nbsp; &#8594;</div>
    <div class="dir-r" id="dir-right"></div>
  </div>
  <div class="chart-scroll">
    <div id="loading">Loading layer chart data...</div>
    <table id="chart-table" style="display:none;">
      <colgroup id="colgroup"><col class="cl"></colgroup>
      <thead id="chart-head"></thead>
      <tbody id="chart-body"></tbody>
    </table>
  </div>
  <div class="legend" id="legend">
    <span class="lg-lbl">Colour Code &#8594;</span>
  </div>
</div>
<script>
const REPO_BASE = 'https://hathi-jigar.github.io/support-dashboard';
const URLS = {
  j1: REPO_BASE + '/data/j1.json',
  j2: REPO_BASE + '/data/j2.json',
  j3: REPO_BASE + '/data/j3.json',
  j4: REPO_BASE + '/data/j4.json',
};
const ARR = '\u2192';

// All possible colour definitions for legend
const ALL_COLOURS = [
  { key:'emb',  label:'EMB Layer',     hex:'#4472C4' },
  { key:'etop', label:'EMB Top',       hex:'#92D050' },
  { key:'elvl', label:'EMB Top Level', hex:'#92D050' },
  { key:'sg',   label:'SG Layer',      hex:'#00B050' },
  { key:'gsb',  label:'GSB',           hex:'#FFFF00' },
  { key:'wmm',  label:'WMM',           hex:'#FF6600' },
  { key:'dbm',  label:'DBM',           hex:'#00B0F0' },
  { key:'bc',   label:'BC',            hex:'#FF99CC' },
  { key:'cog',  label:'C&amp;G &amp; OGL',  hex:'#E8E8E8' },
  { key:'exc',  label:'Excavation',    hex:'#C0C0C0' },
];

function parseCh(s) {
  if (!s) return null;
  const c = String(s).replace(/\s+/g,'');
  const m = c.match(/(\d+)\+(\d+)/);
  if (m) return parseInt(m[1])*1000 + parseInt(m[2]);
  return null;
}
function extractRange(s) {
  if (!s) return null;
  const m = s.match(/(\d[\d\s]*\+[\d\s]+?)\s+to\s+([\d\s]*\+[\d\s]+)/i);
  if (!m) return null;
  const f=parseCh(m[1]), t=parseCh(m[2]);
  return (f!==null&&t!==null)?{from:f,to:t}:null;
}
function fmtCh(m) {
  return String(Math.floor(m/1000)).padStart(3,'0')+'+'+String(m%1000).padStart(3,'0');
}
function fmtDate(s) {
  const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
             Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const m=s&&s.match(/(\d+)\s+([A-Za-z]+)[^,]*,\s*(\d{4})/);
  if (!m) return s||'';
  return m[1].padStart(2,'0')+'.'+(mo[m[2]]||'??')+'.'+m[3].slice(2);
}
function colourClass(name) {
  const n=(name||'').toLowerCase();
  if (n.includes('embank top level')) return 'elvl';
  if (n.includes('embank top'))       return 'etop';
  return 'emb';
}

// Build a full row of TOTAL cells given a set of coloured ranges
// ranges: [{from,to,content,cls}]
// Returns HTML string of <td> elements
function buildRowCells(ranges, TOTAL, chartFrom, SUB) {
  // Build slot array: slot[col] = {cls, content, rangeStart, rangeEnd} or null
  const slots = new Array(TOTAL).fill(null);

  for (const rng of ranges) {
    const f = Math.max(rng.from, chartFrom);
    const t = Math.min(rng.to,   chartFrom + TOTAL*SUB);
    if (f>=t) continue;
    const s = Math.round((f-chartFrom)/SUB);
    const e = Math.round((t-chartFrom)/SUB);
    for (let c=s; c<e; c++) {
      slots[c] = { cls: rng.cls, content: rng.content, rangeS: s, rangeE: e-1 };
    }
  }

  // Now emit tds — merge consecutive same-range cols into one td
  let html = '';
  let i = 0;
  while (i < TOTAL) {
    const sl = slots[i];
    if (!sl) {
      // empty cell
      html += '<td class="emp"></td>';
      i++;
    } else {
      // find run end (same rangeS+rangeE)
      let j = i+1;
      while (j < TOTAL && slots[j] &&
             slots[j].rangeS === sl.rangeS && slots[j].rangeE === sl.rangeE) j++;
      const span = j - i;
      const sp   = span > 1 ? ' colspan="'+span+'"' : '';
      html += '<td class="'+sl.cls+' d"'+sp+'>'+( sl.content||'')+'</td>';
      i = j;
    }
  }
  return html;
}

async function main() {
  const statusEl  = document.getElementById('status-bar');
  const loadingEl = document.getElementById('loading');
  const tableEl   = document.getElementById('chart-table');
  try {
    statusEl.textContent='Fetching data...';
    const [j1,j2,j3,j4] = await Promise.all(
      Object.values(URLS).map(u=>fetch(u).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}))
    );
    statusEl.textContent='Building chart...';

    // ── JSON2: nomenclature ───────────────────────────────
    const level1 = j2.filter(r=>r['Level']==='1'&&r['Is Active']==='true')
                     .sort((a,b)=>parseInt(a['Order'])-parseInt(b['Order']));
    const level2ByParent = {};
    for (const r of j2.filter(r=>r['Level']==='2'&&r['Is Active']==='true')) {
      const pid=r['Parent Level ID'];
      if (!level2ByParent[pid]) level2ByParent[pid]=[];
      level2ByParent[pid].push(r);
    }
    for (const pid in level2ByParent)
      level2ByParent[pid].sort((a,b)=>parseInt(a['Order'])-parseInt(b['Order']));

    // Chart extents
    let chartFrom=Infinity, chartTo=-Infinity;
    for (const r of j2.filter(r=>r['Level']==='2')) {
      const rng=extractRange(r['Name']);
      if (rng){chartFrom=Math.min(chartFrom,rng.from);chartTo=Math.max(chartTo,rng.to);}
    }
    if (!isFinite(chartFrom)){chartFrom=64000;chartTo=65000;}
    const CHART_LEN=chartTo-chartFrom;
    const BLOCK=100, SUB=10;
    const NUM_BLOCKS=CHART_LEN/BLOCK, SUBS=BLOCK/SUB, TOTAL=NUM_BLOCKS*SUBS;

    // Title
    document.getElementById('title-bar').textContent=
      '{ LAYER CHART   Ch :-   '+fmtCh(chartFrom)+'   To   '+fmtCh(chartTo)+'   SIDE :-   RHS }';
    document.getElementById('dir-left').textContent='Meerut ->';
    document.getElementById('dir-right').textContent='<- Prayagraj';

    // ── JSON4: RFI map ────────────────────────────────────
    const K_EQCNAME = 'Eqc '+ARR+' Eqc Name';
    const K_STAGE   = 'Eqc Stage '+ARR+' Name';
    const rfiMap={};
    for (const r of j4) {
      const path    =r[K_EQCNAME]||'';
      const stageStr=r[K_STAGE]||'';
      const rfiNum  =String(r['Qc Option']||r['ID']);
      const rfiDate =fmtDate(r['Created At']);
      const lm=stageStr.match(/layer\s*(\d+)/i);
      if (!lm) continue;
      const layerNum=parseInt(lm[1]);
      const rng=extractRange(path);
      if (!rng) continue;
      const key=rng.from+'_'+rng.to;
      if (!rfiMap[key]) rfiMap[key]={};
      rfiMap[key][layerNum]={rfiDate,rfiNum};
    }

    // ── JSON1: checklists ─────────────────────────────────
    const K_STNAME='Project Eqc Type Stage '+ARR+' Name';
    const ckById={};
    for (const r of j1) {
      const id=String(r['ID']),nm=r['Name'],stg=r[K_STNAME];
      if (!ckById[id]) ckById[id]={name:nm,stages:[]};
      if (stg&&!ckById[id].stages.includes(stg)) ckById[id].stages.push(stg);
    }
    for (const id in ckById)
      ckById[id].stages.sort((a,b)=>parseInt(a.match(/\d+/)?.[0]||0)-parseInt(b.match(/\d+/)?.[0]||0));

    // Classify
    const embLevelCks=[], embTopCks=[], embLayerCks=[];
    for (const ck of Object.values(ckById)) {
      const nl=ck.name.toLowerCase();
      if (nl.includes('embank top level'))  embLevelCks.push(ck);
      else if (nl.includes('embank top'))   embTopCks.push(ck);
      else                                   embLayerCks.push(ck);
    }
    embLayerCks.sort((a,b)=>(extractRange(a.name)?.from||0)-(extractRange(b.name)?.from||0));

    // Track which colour classes are actually used — for legend
    const usedClasses = new Set();

    // ── Build colgroup + headers ──────────────────────────
    const cg=document.getElementById('colgroup');
    for (let i=0;i<TOTAL;i++){const c=document.createElement('col');c.className='csub';cg.appendChild(c);}
    let h1='<tr><th class="ch-label-hd" rowspan="2">CHAINAGE</th>';
    for (let b=1;b<=NUM_BLOCKS;b++)
      h1+='<th class="ch-block" colspan="'+SUBS+'">'+ ((chartFrom+b*BLOCK)/1000).toFixed(3)+'</th>';
    h1+='</tr>';
    let h2='<tr>';
    for (let b=0;b<NUM_BLOCKS;b++) for (let s=1;s<=SUBS;s++) h2+='<td class="ch-sub">'+(s*SUB)+'</td>';
    h2+='</tr>';
    document.getElementById('chart-head').innerHTML=h1+h2;

    // ── Helper: render rows for a checklist group ─────────
    // stages: array of stage names (already in desired render order)
    // nomenclatureRanges: [{from,to}] from JSON2 for this work type
    // reversed layers: highest layer rendered first (top), layer 1 last (bottom)
    function renderCkRows(ck, cls, nomenclatureRanges, stagesInOrder, totalRowspan, isFirstRow) {
      let html='';
      let first=isFirstRow;
      for (let si=0;si<stagesInOrder.length;si++) {
        const stageName=stagesInOrder[si];
        const layerNum=parseInt(stageName.match(/\d+/)?.[0]||1);

        // Build coloured ranges for this row from JSON2 nomenclature ranges
        const colRanges=[];
        for (const nr of nomenclatureRanges) {
          const key=nr.from+'_'+nr.to;
          const rfi=rfiMap[key]?.[layerNum];
          colRanges.push({
            from:nr.from, to:nr.to, cls,
            content: rfi ? rfi.rfiDate+'<br>/'+rfi.rfiNum : ''
          });
        }
        usedClasses.add(cls);

        let row='<tr>';
        if (first && totalRowspan>0) {
          row+='<td class="rl-group '+cls+'" rowspan="'+totalRowspan+'">'+
               (ck.name.replace(/\(chainage.*?\)/i,'').trim())+'</td>';
        }
        row+=buildRowCells(colRanges, TOTAL, chartFrom, SUB)+'</tr>';
        html+=row;
        first=false;
      }
      return html;
    }

    let body='';

    // 1. Embank Top Level (top row)
    for (const ck of embLevelCks) {
      const cls='elvl';
      const wtId = Object.keys(level2ByParent).find(pid => {
        const parent=j2.find(r=>r['ID']===pid);
        return parent && parent['Name'].toLowerCase().includes('embank top level');
      });
      const nomRanges = wtId
        ? level2ByParent[wtId].map(r=>extractRange(r['Name'])).filter(Boolean)
        : (extractRange(ck.name) ? [extractRange(ck.name)] : []);

      const stages=[...ck.stages]; // Layer 1 only usually
      const totalRowspan=stages.length;
      body+=renderCkRows(ck,cls,nomRanges,stages,totalRowspan,true);
    }

    // 2. Embank Top
    for (const ck of embTopCks) {
      const cls='etop';
      const wtId = Object.keys(level2ByParent).find(pid => {
        const parent=j2.find(r=>r['ID']===pid);
        return parent && parent['Name'].toLowerCase().includes('embank top') &&
               !parent['Name'].toLowerCase().includes('level');
      });
      const nomRanges = wtId
        ? level2ByParent[wtId].map(r=>extractRange(r['Name'])).filter(Boolean)
        : (extractRange(ck.name) ? [extractRange(ck.name)] : []);

      const stages=[...ck.stages];
      body+=renderCkRows(ck,cls,nomRanges,stages,stages.length,true);
    }

    // 3. Embankment intermediate layers (top = highest layer, bottom = layer 1)
    const totalEmbRows=embLayerCks.reduce((s,ck)=>s+ck.stages.length,0);
    let isFirstEmb=true;

    // Find parent ID for Embankment (OG & CG) work type
    const embParent=j2.find(r=>r['Level']==='1'&&
      r['Name'].toLowerCase().includes('embankment'));
    const embParentId=embParent?.['ID'];

    for (const ck of embLayerCks) {
      const cls='emb';
      // Get nomenclature range for this specific checklist from JSON2
      // Match by chainage range embedded in checklist name
      const ckRange=extractRange(ck.name);
      const nomRanges=ckRange?[ckRange]:[];

      // Render stages reversed: highest layer at top
      const stages=[...ck.stages].reverse();

      let first=isFirstEmb;
      for (let si=0;si<stages.length;si++) {
        const stageName=stages[si];
        const layerNum=parseInt(stageName.match(/\d+/)?.[0]||1);
        const colRanges=[];
        for (const nr of nomRanges) {
          const key=nr.from+'_'+nr.to;
          const rfi=rfiMap[key]?.[layerNum];
          colRanges.push({from:nr.from,to:nr.to,cls,content:rfi?rfi.rfiDate+'<br>/'+rfi.rfiNum:''});
        }
        usedClasses.add(cls);

        let row='<tr>';
        if (first) {
          row+='<td class="rl-group '+cls+'" rowspan="'+totalEmbRows+'">'+
               'Intermediate layer of<br>Embankment<br>with OGL &amp; C&amp;G</td>';
        }
        row+=buildRowCells(colRanges,TOTAL,chartFrom,SUB)+'</tr>';
        body+=row;
        first=false;
        isFirstEmb=false;
      }
    }

    document.getElementById('chart-body').innerHTML=body;

    // ── Legend — only used classes ────────────────────────
    const legendEl=document.getElementById('legend');
    for (const col of ALL_COLOURS) {
      if (usedClasses.has(col.key)) {
        const span=document.createElement('span');
        span.className='lg-item';
        span.innerHTML='<span class="lg-sw" style="background:'+col.hex+
          (col.hex==='#FFFF00'?';border-color:#aaa;':'')+';"></span> '+col.label;
        legendEl.appendChild(span);
      }
    }

    loadingEl.style.display='none';
    tableEl.style.display='';
    statusEl.className='';
    statusEl.textContent='Live data — Last refreshed: '+new Date().toLocaleTimeString('en-IN');

  } catch(err) {
    console.error(err);
    loadingEl.innerHTML='<span style="color:#c00;font-size:11px">Failed to load: '+err.message+'</span>';
    statusEl.className='err';
    statusEl.textContent='Data unavailable';
  }
}

main();
setInterval(main,5*60*1000);
</script>
</body>
</html>
