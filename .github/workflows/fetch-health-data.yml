name: Fetch Health Data from Metabase

# Auto cron is PAUSED during manual-testing phase.
# Runs server-side so it bypasses the browser CORS block the dashboard hits.
on:
  # schedule:
  #   - cron: '0 3 * * 1'  # Every Monday 8:30 AM IST (3:00 AM UTC)
  workflow_dispatch: # Manual trigger only

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Metabase data
        run: |
          curl -sL "https://metabase-v2.digiqc.com/public/question/b4036adb-7d2e-4878-a501-0294b8f3606c.json" -o health/data.json
          echo "Fetched:"
          head -c 500 health/data.json
          echo ""
          wc -c health/data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update health data from Metabase"
            git push
          fi
