name: Fetch Layer Chart Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: fetch-layer-chart
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch all project data
        run: |
          METABASE_BASE="https://metabase-v2.digiqc.com/api/public/card"

          for row in $(jq -c '.projects[] | select(.active == true)' projects.json); do
            SLUG=$(echo "$row" | jq -r '.slug')
            J1=$(echo "$row" | jq -r '.metabase.j1')
            J2=$(echo "$row" | jq -r '.metabase.j2')
            J3=$(echo "$row" | jq -r '.metabase.j3')
            J4=$(echo "$row" | jq -r '.metabase.j4')

            echo "Fetching data for project: $SLUG"
            mkdir -p "data/$SLUG"

            curl -sL "$METABASE_BASE/$J1/query/json" -o "data/$SLUG/j1.json"
            curl -sL "$METABASE_BASE/$J2/query/json" -o "data/$SLUG/j2.json"
            curl -sL "$METABASE_BASE/$J3/query/json" -o "data/$SLUG/j3.json"
            curl -sL "$METABASE_BASE/$J4/query/json" -o "data/$SLUG/j4.json"
          done

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh layer chart data [skip ci]"
          git push
