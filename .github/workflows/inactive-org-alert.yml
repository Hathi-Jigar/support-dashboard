name: Inactive Org Alert

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  check-inactive-orgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch Metabase Data
        run: |
          HTTP_CODE=$(curl -sL \
            -o /tmp/result.json \
            -w "%{http_code}" \
            "http://metabase-v2.digiqc.com/api/public/card/e9331eaf-825d-46f8-a865-64f6727b3801/query")
          echo "HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "Metabase fetch failed"
            cat /tmp/result.json
            exit 1
          fi

      - name: Notify Google Chat
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: python3 .github/scripts/notify_inactive.py
