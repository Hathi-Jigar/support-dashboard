name: Inactive Org Alert

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  check-inactive-orgs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Metabase Data
        run: |
          curl -sL \
            -o /tmp/result.json \
            "http://metabase-v2.digiqc.com/api/public/card/e9331eaf-825d-46f8-a865-64f6727b3801/query"
          echo "Fetch done. Size: $(wc -c < /tmp/result.json) bytes"
          head -c 300 /tmp/result.json

      - name: Notify Google Chat
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: python3 .github/scripts/notify_inactive.py
