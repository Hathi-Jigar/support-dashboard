name: Inactive Org Alert - digiQC

on:
  schedule:
    - cron: '30 13 * * *'  # 7:00 PM IST (13:30 UTC) daily
  workflow_dispatch:

jobs:
  check-inactive-orgs:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Metabase Public Query
        run: |
          echo "=== Fetching Metabase public card ==="
          HTTP_CODE=$(curl -sL \
            -o /tmp/result.json \
            -w "%{http_code}" \
            -X GET \
            "http://metabase-v2.digiqc.com/api/public/card/e9331eaf-825d-46f8-a865-64f6727b3801/query")

          echo "HTTP Status: $HTTP_CODE"
          echo "File size: $(wc -c < /tmp/result.json) bytes"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "HTTP $HTTP_CODE from Metabase - exiting"
            exit 1
          fi
          echo "Data fetched successfully!"

      - name: Check Inactivity and Notify Google Chat
        run: |
          python3 << 'EOF'
          import json, os, sys, urllib.request, urllib.error
          from datetime import date

          webhook = os.environ.get("GOOGLE_CHAT_WEBHOOK", "").strip()
          if not webhook:
              print("ERROR: GOOGLE_CHAT_WEBHOOK secret is not set!")
              sys.exit(1)
          print(f"Webhook secret found (length: {len(webhook)})")

          with open("/tmp/result.json") as f:
              content = f.read().strip()

          try:
              raw = json.loads(content)
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e} | Raw: {content[:300]}")
              sys.exit(1)

          if isinstance(raw, list):
              rows = raw
          elif "data" in raw:
              cols = [col["name"] for col in raw["data"]["cols"]]
              rows = [dict(zip(cols, row)) for row in raw["data"]["rows"]]
          else:
              print(f"Unexpected structure: {list(raw.keys())}")
              sys.exit(1)

          print(f"Total rows: {len(rows)}")
          if rows:
              print(f"Columns: {list(rows[0].keys())}")

          ORG_COL = None
          for candidate in ["Organization Name", "organization_name", "org_name",
                            "Organisation Name", "organisation_name", "name", "Name"]:
              if rows and candidate in rows[0]:
                  ORG_COL = candidate
                  break
          if not ORG_COL:
              ORG_COL = list(rows[0].keys())[0] if rows else "Unknown"
          print(f"Using org column: '{ORG_COL}'")

          alerts = [
              r for r in rows
              if r.get("inactive_days") is not None and float(r["inactive_days"]) > 5
          ]
          print(f"Alerts >5 days: {len(alerts)}")

          if not alerts:
              print("All orgs active within 5 days - no alert sent.")
              sys.exit(0)

          critical = [r for r in alerts if float(r["inactive_days"]) > 30]
          high     = [r for r in alerts if 14 < float(r["inactive_days"]) <= 30]
          watch    = [r for r in alerts if  5 < float(r["inactive_days"]) <= 14]

          widgets = []
          for row in alerts:
              days = float(row.get("inactive_days", 0))
              org  = row.get(ORG_COL, "Unknown")
              if days > 30:   emoji, label = "\U0001f534", "Critical"
              elif days > 14: emoji, label = "\U0001f7e0", "High"
              else:           emoji, label = "\U0001f7e1", "Watch"
              widgets.append({
                  "decoratedText": {
                      "topLabel": f"{emoji} {label}",
                      "text": f"<b>{org}</b>",
                      "bottomLabel": f"{days:.0f} days inactive"
                  }
              })

          summary_widget = {
              "columns": {
                  "columnItems": [
                      {"widgets": [{"decoratedText": {"topLabel": "\U0001f534 Critical (>30d)", "text": f"<b>{len(critical)}</b> orgs"}}]},
                      {"widgets": [{"decoratedText": {"topLabel": "\U0001f7e0 High (>14d)",     "text": f"<b>{len(high)}</b> orgs"}}]},
                      {"widgets": [{"decoratedText": {"topLabel": "\U0001f7e1 Watch (>5d)",     "text": f"<b>{len(watch)}</b> orgs"}}]}
                  ]
              }
          }

          payload = {
              "cardsV2": [{
                  "card": {
                      "header": {
                          "title": "digiQC Daily Inactivity Report",
                          "subtitle": f"{date.today().strftime('%d %b %Y')} - {len(alerts)} org(s) inactive > 5 days",
                          "imageType": "CIRCLE"
                      },
                      "sections": [
                          {
                              "header": f"Inactive Organizations ({len(alerts)})",
                              "collapsible": True,
                              "uncollapsibleWidgetsCount": 5,
                              "widgets": widgets
                          },
                          {
                              "header": "Summary",
                              "widgets": [summary_widget]
                          },
                          {
                              "widgets": [{
                                  "buttonList": {
                                      "buttons": [{
                                          "text": "Open in Metabase",
                                          "onClick": {
                                              "openLink": {
                                                  "url": "http://metabase-v2.digiqc.com/public/question/e9331eaf-825d-46f8-a865-64f6727b3801"
                                              }
                                          }
                                      }]
                                  }
                              }]
                          }
                      ]
                  }
              }]
          }

          data = json.dumps(payload).encode()
          req = urllib.request.Request(webhook, data=data,
                headers={"Content-Type": "application/json"})
          try:
              resp = urllib.request.urlopen(req)
              print(f"Alert sent successfully! {len(alerts)} org(s) flagged.")
          except urllib.error.HTTPError as e:
              print(f"Webhook error: {e.code} - {e.read().decode()}")
              sys.exit(1)
          EOF
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
