name: Inactive Org Alert — digiQC

on:
  schedule:
    - cron: '30 13 * * *'  # 7:00 PM IST (13:30 UTC) daily
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  check-inactive-orgs:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Metabase Public Query
        run: |
          echo "--- Fetching Metabase data ---"
          curl -sL \
            "http://metabase-v2.digiqc.com/api/public/card/e9331eaf-825d-46f8-a865-64f6727b3801/query/json" \
            -o /tmp/result.json

          echo "--- HTTP status check ---"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" \
            "http://metabase-v2.digiqc.com/api/public/card/e9331eaf-825d-46f8-a865-64f6727b3801/query/json")
          echo "HTTP Status: $HTTP_CODE"

          echo "--- Raw API Response (first 500 chars) ---"
          head -c 500 /tmp/result.json
          echo ""

          echo "--- File size ---"
          wc -c /tmp/result.json

      - name: Check Inactivity & Notify Google Chat
        run: |
          python3 << 'EOF'
          import json, os, sys, urllib.request, urllib.error
          from datetime import date

          # ── Validate secret ──
          webhook = os.environ.get("GOOGLE_CHAT_WEBHOOK", "").strip()
          if not webhook:
              print("❌ ERROR: GOOGLE_CHAT_WEBHOOK secret is empty or not set!")
              print("Go to: Settings → Secrets and variables → Actions → New repository secret")
              print("Name: GOOGLE_CHAT_WEBHOOK")
              sys.exit(1)
          else:
              print(f"✅ Webhook secret found (length: {len(webhook)})")

          # ── Load Metabase response ──
          with open("/tmp/result.json") as f:
              content = f.read()

          print(f"Raw response length: {len(content)} chars")

          try:
              raw = json.loads(content)
          except json.JSONDecodeError as e:
              print(f"❌ ERROR: Could not parse JSON from Metabase: {e}")
              print(f"Response was: {content[:300]}")
              sys.exit(1)

          # ── Check for API error ──
          if "error" in raw:
              print(f"❌ Metabase API error: {raw['error']}")
              sys.exit(1)

          if "data" not in raw:
              print(f"❌ Unexpected response structure: {list(raw.keys())}")
              sys.exit(1)

          # ── Map columns to row dicts ──
          cols = [col["name"] for col in raw["data"]["cols"]]
          rows = [dict(zip(cols, row)) for row in raw["data"]["rows"]]

          print(f"Columns   : {cols}")
          print(f"Total rows: {len(rows)}")
          if rows:
              print(f"Sample row: {rows[0]}")

          # ── Filter orgs inactive > 5 days ──
          alerts = [
              r for r in rows
              if r.get("inactive_days") is not None and float(r["inactive_days"]) > 5
          ]

          print(f"Alerts (>5 days): {len(alerts)}")

          if not alerts:
              print("✅ All orgs active within 5 days — no alert sent.")
              sys.exit(0)

          # ── Severity buckets ──
          critical = [r for r in alerts if float(r["inactive_days"]) > 30]
          high     = [r for r in alerts if 14 < float(r["inactive_days"]) <= 30]
          watch    = [r for r in alerts if  5 < float(r["inactive_days"]) <= 14]

          # ── Build per-org widgets ──
          widgets = []
          for row in alerts:
              days = float(row.get("inactive_days", 0))
              org  = row.get("Organization Name", "Unknown")
              last = row.get("last_activity_date", "Never")

              if days > 30:
                  emoji, label = "🔴", "Critical"
              elif days > 14:
                  emoji, label = "🟠", "High"
              else:
                  emoji, label = "🟡", "Watch"

              widgets.append({
                  "decoratedText": {
                      "topLabel": f"{emoji} {label}  ·  {org}",
                      "text": f"<b>{days:.0f} days</b> inactive",
                      "bottomLabel": f"Last activity: {last}"
                  }
              })

          # ── Summary widget ──
          summary_widget = {
              "columns": {
                  "columnItems": [
                      {"widgets": [{"decoratedText": {"topLabel": "🔴 Critical (>30d)", "text": f"<b>{len(critical)}</b> orgs"}}]},
                      {"widgets": [{"decoratedText": {"topLabel": "🟠 High (>14d)",     "text": f"<b>{len(high)}</b> orgs"}}]},
                      {"widgets": [{"decoratedText": {"topLabel": "🟡 Watch (>5d)",     "text": f"<b>{len(watch)}</b> orgs"}}]}
                  ]
              }
          }

          # ── Full Card payload ──
          payload = {
              "cardsV2": [{
                  "card": {
                      "header": {
                          "title": "📋 digiQC — Daily Inactivity Report",
                          "subtitle": f"{date.today().strftime('%d %b %Y')}  ·  {len(alerts)} org(s) inactive > 5 days",
                          "imageType": "CIRCLE"
                      },
                      "sections": [
                          {
                              "header": f"⚠️ Inactive Organizations ({len(alerts)})",
                              "collapsible": True,
                              "uncollapsibleWidgetsCount": 5,
                              "widgets": widgets
                          },
                          {
                              "header": "Summary",
                              "widgets": [summary_widget]
                          },
                          {
                              "widgets": [{
                                  "buttonList": {
                                      "buttons": [{
                                          "text": "📊 Open in Metabase",
                                          "onClick": {
                                              "openLink": {
                                                  "url": "http://metabase-v2.digiqc.com/public/question/e9331eaf-825d-46f8-a865-64f6727b3801"
                                              }
                                          }
                                      }]
                                  }
                              }]
                          }
                      ]
                  }
              }]
          }

          # ── Send to Google Chat ──
          print(f"Sending to webhook...")
          data = json.dumps(payload).encode()
          req = urllib.request.Request(
              webhook, data=data,
              headers={"Content-Type": "application/json"}
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f"✅ Alert sent! Status: {resp.status} — {len(alerts)} org(s) flagged.")
          except urllib.error.HTTPError as e:
              print(f"❌ Webhook HTTP error: {e.code} {e.reason}")
              print(e.read().decode())
              sys.exit(1)
          except urllib.error.URLError as e:
              print(f"❌ Webhook URL error: {e.reason}")
              sys.exit(1)
          EOF
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
