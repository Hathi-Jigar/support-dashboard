name: Keep Alive

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 6 AM UTC = 11:30 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ping to keep repo active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > .github/last-alive.txt
          git add .github/last-alive.txt
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d')"
          git push origin main || echo "Push skipped"
