name: Keep Alive

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 6 AM UTC (11:30 AM IST)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Ping to keep repo active
        run: |
          git config user.email "bot@digiqc.com"
          git config user.name "digiQC Bot"
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > .github/last-alive.txt
          git add .github/last-alive.txt
          git diff --staged --quiet || git commit -m "chore: keep-alive $(date -u +"%Y-%m-%d")"
          git push
