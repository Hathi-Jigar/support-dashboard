name: Keep Alive

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC (11:30 AM IST)
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep repo active
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/last-alive.txt
          git add .github/last-alive.txt
          git diff --staged --quiet || git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d')"
          git push
