<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Chart</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#d0d4d8; padding:16px; font-size:11px; }
.page { background:#fff; margin:0 auto; border:2px solid #2c3e50; box-shadow:0 2px 12px rgba(0,0,0,0.18); width:max-content; min-width:100%; }
#top-bar { display:flex; align-items:center; justify-content:space-between; padding:4px 10px; background:#f8f9fa; border-bottom:1px solid #e0e0e0; min-height:32px; }
#status-bar { font-size:9px; color:#888; font-style:italic; }
#status-bar.err { color:#c00; font-weight:bold; font-style:normal; }
.btn-group { display:flex; align-items:center; gap:8px; }
.top-btn { display:none; align-items:center; gap:5px; border:none; border-radius:4px; padding:5px 12px; font-size:10px; font-weight:bold; cursor:pointer; letter-spacing:0.3px; transition:background 0.2s; color:#fff; }
.top-btn svg { width:13px; height:13px; fill:#fff; flex-shrink:0; }
.top-btn.green { background:#1e6e42; }
.top-btn.green:hover { background:#155234; }
#loading { padding:60px; text-align:center; font-size:14px; color:#666; }
.title-bar { text-align:center; font-size:14px; font-weight:bold; padding:7px 12px; border-bottom:2px solid #2c3e50; letter-spacing:0.5px; background:#fff; }
.dir-bar { display:grid; grid-template-columns:160px 1fr 160px; border-bottom:2px solid #2c3e50; font-size:10px; background:#f0f4f8; }
.dir-bar > div { padding:3px 8px; }
.dir-l { border-right:1px solid #aaa; font-weight:bold; }
.dir-m { text-align:center; font-weight:bold; font-size:12px; font-style:italic; letter-spacing:3px; }
.dir-r { border-left:1px solid #aaa; text-align:right; font-weight:bold; }
.chart-scroll { overflow-x:auto; }
table { border-collapse:collapse; table-layout:fixed; }
table td, table th { border:1px solid #b0b8c1; text-align:center; vertical-align:middle; padding:0; overflow:hidden; line-height:1.3; }
.cl   { width:160px; min-width:160px; }
.csub { width:32px;  min-width:32px; }
.ch-block { background:linear-gradient(180deg,#2c5f8a 0%,#3a7cbf 100%); font-weight:bold; font-size:11px; color:#fff; height:48px; writing-mode:vertical-lr; transform:rotate(180deg); padding:3px 0; border:1px solid #1e4a73; letter-spacing:0.5px; }
.ch-sub { background:#daeef3; font-size:8px; color:#444; height:16px; padding:1px 0; border:1px solid #9fbfcc; font-weight:bold; }
.ch-label-hd { background:linear-gradient(180deg,#2c5f8a 0%,#3a7cbf 100%); font-weight:bold; font-size:12px; color:#fff; text-align:center; vertical-align:middle; border:1px solid #1e4a73; letter-spacing:0.5px; }
.rl { text-align:left; padding:5px 8px; font-size:10px; font-weight:bold; white-space:normal; word-break:break-word; vertical-align:middle; border:1px solid #aab !important; line-height:1.4; }
.rl-group { text-align:left; padding:5px 8px; font-size:9.5px; font-weight:bold; white-space:normal; word-break:break-word; vertical-align:middle; line-height:1.4; border:1px solid #aab !important; }
.emp { background:#f5f7fa; }
.d { font-size:8px; padding:3px 2px; white-space:normal; word-break:break-word; line-height:1.4; font-weight:bold; height:28px; vertical-align:middle; }
.legend { display:flex; align-items:center; flex-wrap:wrap; gap:12px; padding:7px 12px; border-top:2px solid #2c3e50; font-size:10px; background:#f8f9fa; }
.lg-lbl { font-weight:bold; color:#2c3e50; }
.lg-item { display:flex; align-items:center; gap:5px; font-weight:500; }
.lg-sw { width:32px; height:14px; border:1px solid #666; border-radius:2px; display:inline-block; }
@media print { body{padding:0;background:#fff;} .page{border:1px solid #333;box-shadow:none;} #top-bar,#loading{display:none!important;} }
</style>
</head>
<body>
<div class="page">
  <div id="top-bar">
    <span id="status-bar">Initialising...</span>
    <div class="btn-group">
      <button id="export-btn" class="top-btn green" onclick="exportExcel()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zm-2 4h-2v2H8v-2H6v-1l3-3 3 3v1zm0 3H8v3h4v-3z"/></svg>
        Export to Excel
      </button>
    </div>
  </div>
  <div class="title-bar" id="title-bar">Loading...</div>
  <div class="dir-bar">
    <div class="dir-l" id="dir-left"></div>
    <div class="dir-m">&#8592; &nbsp; MAIN CARRIAGE WAY &nbsp; &#8594;</div>
    <div class="dir-r" id="dir-right"></div>
  </div>
  <div class="chart-scroll">
    <div id="loading">&#9203; &nbsp; Loading layer chart data...</div>
    <table id="chart-table" style="display:none;">
      <colgroup id="colgroup"><col class="cl"></colgroup>
      <thead id="chart-head"></thead>
      <tbody id="chart-body"></tbody>
    </table>
  </div>
  <div class="legend" id="legend">
    <span class="lg-lbl">Colour Code &#8594;</span>
  </div>
</div>

<script>
const REPO_BASE = 'https://hathi-jigar.github.io/support-dashboard';
const ARR = '\u2192';

// Read project slug from URL
const _params = new URLSearchParams(window.location.search);
const projectSlug = _params.get('project');
if (!projectSlug) {
  document.getElementById('loading').innerHTML = '<span style="color:#c00;font-size:12px">No project specified. <a href="layer-charts.html">Go to project list</a></span>';
}
let projectConfig = null;
const EMP = { bg:'#f5f7fa', fg:'#333333', fill:'F5F7FA' };

// ── Per-Level-1 color palette ──────────────────────────────
// Each checklist type gets its own unique color.
// Known types get traditional construction chart colours; unknown get auto-assigned.
const COLOR_MAP = [
  { p:/embankment|og.*cg/i,   bg:'#4472C4', fg:'#FFFFFF', fill:'4472C4', grouped:true },
  { p:/sg.*top.*level/i,      bg:'#90EE90', fg:'#333333', fill:'90EE90' },
  { p:/sg.*top$/i,            bg:'#228B22', fg:'#FFFFFF', fill:'228B22' },
  { p:/sg.*2/i,               bg:'#2E8B57', fg:'#FFFFFF', fill:'2E8B57' },
  { p:/sg.*1/i,               bg:'#00B050', fg:'#FFFFFF', fill:'00B050' },
  { p:/^sg/i,                 bg:'#3CB371', fg:'#FFFFFF', fill:'3CB371' },
  { p:/top\s*level/i,         bg:'#92D050', fg:'#333333', fill:'92D050' },
  { p:/top$/i,                bg:'#70AD47', fg:'#FFFFFF', fill:'70AD47' },
  { p:/gsb|ctsb/i,            bg:'#FFFF00', fg:'#333333', fill:'FFFF00' },
  { p:/wmm/i,                 bg:'#FF6600', fg:'#FFFFFF', fill:'FF6600' },
  { p:/dbm/i,                 bg:'#00B0F0', fg:'#FFFFFF', fill:'00B0F0' },
  { p:/^bc/i,                 bg:'#FF99CC', fg:'#333333', fill:'FF99CC' },
];
const EXTRA_COLORS = [
  { bg:'#8B4513', fg:'#FFFFFF', fill:'8B4513' },
  { bg:'#9370DB', fg:'#FFFFFF', fill:'9370DB' },
  { bg:'#20B2AA', fg:'#FFFFFF', fill:'20B2AA' },
  { bg:'#DC143C', fg:'#FFFFFF', fill:'DC143C' },
  { bg:'#FF8C00', fg:'#FFFFFF', fill:'FF8C00' },
];
let extraIdx=0;
function getColor(name){
  for(const c of COLOR_MAP) if(c.p.test(name)) return { bg:c.bg, fg:c.fg, fill:c.fill, grouped:!!c.grouped };
  const c=EXTRA_COLORS[extraIdx%EXTRA_COLORS.length]; extraIdx++;
  return { bg:c.bg, fg:c.fg, fill:c.fill, grouped:false };
}
function hex6(h){ const x=h.replace('#',''); return x.length===3?x[0]+x[0]+x[1]+x[1]+x[2]+x[2]:x; }

let excelData=[], excelMerges=[], excelTitle='', excelChFrom=0, excelChTo=0, excelTOTAL=0, excelSUB=10, excelBLOCK=100, excelSide='RHS';

function parseCh(s){
  if(!s)return null;
  const c=String(s).replace(/\s+/g,''),m=c.match(/^(\d+)\+(\d+)$/);
  return m?parseInt(m[1])*1000+parseInt(m[2]):null;
}
function extractRange(s){
  if(!s)return null;
  const m=s.match(/(\d[\d\s]*\+\s*[\d]+)\s+to\s+(\d[\d\s]*\+\s*[\d]+)/i);
  if(!m)return null;
  const f=parseCh(m[1]),t=parseCh(m[2]);
  return(f!==null&&t!==null)?{from:f,to:t}:null;
}
function fmtCh(m){ return String(Math.floor(m/1000)).padStart(3,'0')+'+'+String(m%1000).padStart(3,'0'); }
function fmtDate(s){
  if(!s)return'';
  const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const m=s.match(/(\d{1,2})\s+([A-Za-z]{3})[,\s]+(2\d{3})/);
  return m?m[1].padStart(2,'0')+'-'+(mo[m[2]]||'??')+'-'+m[3].slice(2):s;
}
function cellLabel(rfi){ return rfi?rfi.rfiDate+' / '+rfi.rfiNum:''; }

// ── Build HTML cells with inline colors ──────────────────────
function buildRowCells(colRanges,TOTAL,chartFrom,SUB){
  const blocks=[];
  for(const rng of colRanges){
    const f=Math.max(rng.from,chartFrom),t=Math.min(rng.to,chartFrom+TOTAL*SUB);
    if(f>=t)continue;
    const s=Math.round((f-chartFrom)/SUB),e=Math.round((t-chartFrom)/SUB);
    if(e>s)blocks.push({s,e,bg:rng.bg,fg:rng.fg,content:rng.content||''});
  }
  blocks.sort((a,b)=>a.s-b.s);
  let html='',col=0;
  for(const blk of blocks){
    while(col<blk.s){html+='<td class="emp d"></td>';col++;}
    const span=blk.e-blk.s,sp=span>1?' colspan="'+span+'"':'';
    html+='<td class="d" style="background:'+blk.bg+';color:'+blk.fg+'"'+sp+'>'+blk.content+'</td>';
    col=blk.e;
  }
  while(col<TOTAL){html+='<td class="emp d"></td>';col++;}
  return html;
}

// ── Build cell array for Excel with color info ───────────────
function buildCellArray(colRanges,TOTAL,chartFrom,SUB){
  const arr=Array(TOTAL).fill(null).map(()=>({content:'',fill:EMP.fill,fg:EMP.fg}));
  for(const rng of colRanges){
    const f=Math.max(rng.from,chartFrom),t=Math.min(rng.to,chartFrom+TOTAL*SUB);
    if(f>=t)continue;
    const s=Math.round((f-chartFrom)/SUB),e=Math.round((t-chartFrom)/SUB);
    for(let i=s;i<e&&i<TOTAL;i++)arr[i]={content:rng.content||'',fill:rng.fill,fg:rng.fg};
  }
  return arr;
}

// ── EXCEL EXPORT ─────────────────────────────────────────────
function exportExcel(){
  if(!excelData.length)return;
  const wb=XLSX.utils.book_new(),wsData=[];
  const SUBS=excelBLOCK/excelSUB,NUM_BLOCKS=excelTOTAL/SUBS;
  const totalCols=excelTOTAL+1;
  const B={top:{style:'thin'},bottom:{style:'thin'},left:{style:'thin'},right:{style:'thin'}};

  // Row 0: title
  wsData.push([excelTitle]);
  // Row 1: empty
  wsData.push([]);
  // Row 2: chainage block headers
  const hdr1=['CHAINAGE'];
  for(let b=1;b<=NUM_BLOCKS;b++){hdr1.push(((excelChFrom+b*excelBLOCK)/1000).toFixed(3));for(let s=1;s<SUBS;s++)hdr1.push('');}
  wsData.push(hdr1);
  // Row 3: sub-division numbers
  const hdr2=[''];
  for(let b=0;b<NUM_BLOCKS;b++)for(let s=1;s<=SUBS;s++)hdr2.push(s*excelSUB);
  wsData.push(hdr2);
  // Row 4+: data
  for(const row of excelData){const r=[row.rowLabel];for(const c of row.cells)r.push(c.content);wsData.push(r);}

  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=[{wch:28}];for(let i=0;i<excelTOTAL;i++)ws['!cols'].push({wch:10});

  // Merges
  const merges=[{s:{r:0,c:0},e:{r:0,c:totalCols-1}}];
  let mc=1;for(let b=0;b<NUM_BLOCKS;b++){merges.push({s:{r:2,c:mc},e:{r:2,c:mc+SUBS-1}});mc+=SUBS;}
  for(const m of excelMerges) merges.push(m);
  ws['!merges']=merges;

  function addr(r,c){return XLSX.utils.encode_cell({r,c});}
  // Ensure every cell in the sheet exists so merged cells get borders
  const totalRows=4+excelData.length;
  for(let r=0;r<totalRows;r++)for(let c=0;c<totalCols;c++){const a=addr(r,c);if(!ws[a])ws[a]={v:'',t:'s'};}

  // Style: title row
  ws[addr(0,0)].s={fill:{patternType:'solid',fgColor:{rgb:'1E2D3D'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:13},alignment:{horizontal:'center',vertical:'center'},border:B};
  // Style all title merge cells (so borders show)
  for(let c=1;c<totalCols;c++)ws[addr(0,c)].s={fill:{patternType:'solid',fgColor:{rgb:'1E2D3D'}},border:B};

  // Style: chainage block headers (row 2) — all cells get dark blue fill + border
  const hdrStyle={fill:{patternType:'solid',fgColor:{rgb:'2C5F8A'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:10},alignment:{horizontal:'center',vertical:'center'},border:B};
  for(let c=0;c<totalCols;c++)ws[addr(2,c)].s={...hdrStyle};

  // Style: sub-division headers (row 3)
  const subStyle={fill:{patternType:'solid',fgColor:{rgb:'DAEEF3'}},font:{bold:true,sz:8},alignment:{horizontal:'center'},border:B};
  for(let c=0;c<totalCols;c++)ws[addr(3,c)].s={...subStyle};

  // Style: data rows
  for(let ri=0;ri<excelData.length;ri++){
    const row=excelData[ri],er=4+ri;
    // Row label cell
    const labelStyle={fill:{patternType:'solid',fgColor:{rgb:row.labelFill||'F0F4F8'}},font:{bold:true,sz:9,color:{rgb:hex6(row.labelFg||'#333333')}},alignment:{horizontal:'left',vertical:'center',wrapText:true},border:B};
    ws[addr(er,0)].s=labelStyle;
    // Data cells
    for(let ci=0;ci<row.cells.length;ci++){
      const c=row.cells[ci];
      const isEmpty=c.fill===EMP.fill;
      ws[addr(er,ci+1)].s={fill:{patternType:'solid',fgColor:{rgb:c.fill}},font:{bold:!isEmpty&&!!c.content,sz:8,color:{rgb:isEmpty?'333333':hex6(c.fg)}},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:B};
    }
  }

  // Ensure merged row-label cells all have the same style
  for(const m of excelMerges){
    const topStyle=ws[addr(m.s.r,m.s.c)].s;
    for(let r=m.s.r+1;r<=m.e.r;r++){ws[addr(r,0)].s={...topStyle};}
  }

  // Clear values in hidden merge cells (Excel needs them empty for merge to render)
  for(const m of ws['!merges']){
    for(let r=m.s.r;r<=m.e.r;r++){
      for(let c=m.s.c;c<=m.e.c;c++){
        if(r===m.s.r&&c===m.s.c)continue;
        const a=addr(r,c);
        if(ws[a]){delete ws[a].v;ws[a].t='z';}
      }
    }
  }

  // Also merge CHAINAGE label across rows 2-3 (like HTML rowspan=2)
  ws['!merges'].push({s:{r:2,c:0},e:{r:3,c:0}});

  XLSX.utils.book_append_sheet(wb,ws,'Layer Chart');
  XLSX.writeFile(wb,'LayerChart_'+fmtCh(excelChFrom)+'_'+fmtCh(excelChTo)+'_'+excelSide+'.xlsx',{cellStyles:true});
}

// ── MAIN ─────────────────────────────────────────────────────
async function main(){
  const statusEl=document.getElementById('status-bar');
  const loadingEl=document.getElementById('loading');
  const tableEl=document.getElementById('chart-table');
  const exportBtn=document.getElementById('export-btn');
  try {
    if(!projectSlug) throw new Error('No project specified');
    statusEl.textContent='Loading config...';
    extraIdx=0;
    const allConfig=await fetch(REPO_BASE+'/projects.json?t='+Date.now()).then(r=>r.json());
    projectConfig=allConfig.projects.find(p=>p.slug===projectSlug);
    if(!projectConfig) throw new Error('Project "'+projectSlug+'" not found in projects.json');
    document.title='Layer Chart \u2014 '+projectConfig.projectName+' \u2014 '+projectConfig.side;

    statusEl.textContent='Fetching live data from Metabase...';
    const MB='https://metabase-v2.digiqc.com/api/public/card';
    const mb=projectConfig.metabase;
    const URLS={j1:MB+'/'+mb.j1+'/query/json',j2:MB+'/'+mb.j2+'/query/json',j3:MB+'/'+mb.j3+'/query/json',j4:MB+'/'+mb.j4+'/query/json'};
    const [j1,j2,j3,j4]=await Promise.all(
      Object.values(URLS).map(u=>fetch(u).then(r=>{if(!r.ok)throw new Error('Metabase HTTP '+r.status);return r.json();}))
    );
    statusEl.textContent='Building chart...';
    const level2ByParent={};
    for(const r of j2.filter(r=>r['Level']==='2'&&r['Is Active']==='true')){
      const pid=r['Parent Level ID'];
      if(!level2ByParent[pid])level2ByParent[pid]=[];
      level2ByParent[pid].push(r);
    }
    for(const pid in level2ByParent)level2ByParent[pid].sort((a,b)=>parseInt(a['Order'])-parseInt(b['Order']));
    let chartFrom=Infinity,chartTo=-Infinity;
    for(const r of j2.filter(r=>r['Level']==='2')){
      const rng=extractRange(r['Name']);
      if(rng){chartFrom=Math.min(chartFrom,rng.from);chartTo=Math.max(chartTo,rng.to);}
    }
    if(!isFinite(chartFrom)){chartFrom=64000;chartTo=65000;}
    const BLOCK=projectConfig.chainageBlockSize||100,SUB=projectConfig.subDivisionSize||10;
    if(BLOCK%SUB!==0) throw new Error('Block size '+BLOCK+' must be divisible by sub-division size '+SUB);
    const CHART_LEN=chartTo-chartFrom,NUM_BLOCKS=CHART_LEN/BLOCK,SUBS=BLOCK/SUB,TOTAL=NUM_BLOCKS*SUBS;
    excelChFrom=chartFrom;excelChTo=chartTo;excelTOTAL=TOTAL;excelSUB=SUB;excelBLOCK=BLOCK;excelSide=projectConfig.side||'RHS';
    excelTitle='{ LAYER CHART   Ch :-   '+fmtCh(chartFrom)+'   To   '+fmtCh(chartTo)+'   SIDE :-   '+excelSide+' }';
    excelData=[];excelMerges=[];
    document.getElementById('title-bar').textContent=excelTitle;
    document.getElementById('dir-left').textContent=(projectConfig.dirLeft||'')+' \u2192';
    document.getElementById('dir-right').textContent='\u2190 '+(projectConfig.dirRight||'');

    // Build RFI map from j4 — keyed by "typeName_from_to"
    const K_EQC='Eqc '+ARR+' Eqc Name',K_STAGE='Eqc Stage '+ARR+' Name',rfiMap={};
    for(const r of j4){
      const path=r[K_EQC]||'',stgStr=r[K_STAGE]||'';
      const pathType=(path.split('/')[1]||'').trim().toLowerCase();
      const rfiNum=String(r['Qc Option']||r['ID']),rfiDate=fmtDate(r['Created At']);
      const lm=stgStr.match(/layer\s*(\d+)/i);if(!lm)continue;
      const layerNum=parseInt(lm[1]),rng=extractRange(path);if(!rng)continue;
      const key=pathType+'_'+rng.from+'_'+rng.to;
      if(!rfiMap[key])rfiMap[key]={};
      rfiMap[key][layerNum]={rfiDate,rfiNum};
    }
    function rfiKey(typeName,from,to){ return typeName.trim().toLowerCase()+'_'+from+'_'+to; }

    // Parse checkpoints from j1
    const K_STG='Project Eqc Type Stage '+ARR+' Name',ckById={};
    for(const r of j1){
      const id=String(r['ID']),nm=r['Name'],stg=r[K_STG];
      if(!ckById[id])ckById[id]={name:nm,stages:[]};
      if(stg&&!ckById[id].stages.includes(stg))ckById[id].stages.push(stg);
    }
    for(const id in ckById)ckById[id].stages.sort((a,b)=>parseInt(a.match(/\d+/)?.[0]||0)-parseInt(b.match(/\d+/)?.[0]||0));

    // ── Dynamic rendering driven by j2 Level 1 entries ──
    const legendItems=[];
    const cg=document.getElementById('colgroup');
    if(cg.children.length<=1){for(let i=0;i<TOTAL;i++){const c=document.createElement('col');c.className='csub';cg.appendChild(c);}}
    let h1='<tr><th class="ch-label-hd" rowspan="2">CHAINAGE</th>';
    for(let b=1;b<=NUM_BLOCKS;b++)h1+='<th class="ch-block" colspan="'+SUBS+'">'+ ((chartFrom+b*BLOCK)/1000).toFixed(3)+'</th>';
    h1+='</tr>';
    let h2='<tr>';
    for(let b=0;b<NUM_BLOCKS;b++)for(let s=1;s<=SUBS;s++)h2+='<td class="ch-sub">'+(s*SUB)+'</td>';
    h2+='</tr>';
    document.getElementById('chart-head').innerHTML=h1+h2;

    // Level 1 entries in reverse Order (highest layer first)
    const level1s=j2.filter(r=>r['Level']==='1'&&r['Is Active']==='true')
      .sort((a,b)=>parseInt(b['Order'])-parseInt(a['Order']));

    function renderSimpleRows(cks,color,nomRanges,typeName){
      let html='';
      for(const ck of cks){
        const ranges=nomRanges.length>0?nomRanges:(extractRange(ck.name)?[extractRange(ck.name)]:[]);
        const stages=[...ck.stages];
        for(let si=0;si<stages.length;si++){
          const layerNum=parseInt(stages[si].match(/\d+/)?.[0]||1);
          const colRanges=ranges.map(nr=>{const k=rfiKey(typeName,nr.from,nr.to),rfi=rfiMap[k]?.[layerNum];return{from:nr.from,to:nr.to,bg:color.bg,fg:color.fg,fill:color.fill,content:cellLabel(rfi)};});
          const rs=stages.length>1&&si===0?' rowspan="'+stages.length+'"':'';
          html+='<tr>'+(si===0?'<td class="rl" style="background:'+color.bg+';color:'+color.fg+'"'+rs+'>'+ck.name+'</td>':'')+buildRowCells(colRanges,TOTAL,chartFrom,SUB)+'</tr>';
          const excelRow={rowLabel:si===0?ck.name:'',labelFill:color.fill,labelFg:color.fg,cells:buildCellArray(colRanges,TOTAL,chartFrom,SUB)};
          // Merge row label in Excel if rowspan
          if(stages.length>1&&si===0) excelMerges.push({s:{r:4+excelData.length,c:0},e:{r:4+excelData.length+stages.length-1,c:0}});
          excelData.push(excelRow);
        }
      }
      return html;
    }

    let body='';
    for(const l1 of level1s){
      const color=getColor(l1['Name']);
      const typeName=l1['Name'];
      const nomRanges=(level2ByParent[l1['ID']]||[]).map(r=>extractRange(r['Name'])).filter(Boolean);

      if(color.grouped){
        // Grouped rendering — embankment-style with chainage in j1 names
        const cks=Object.values(ckById).filter(ck=>{
          const rng=extractRange(ck.name);
          if(!rng)return false;
          return nomRanges.some(nr=>rng.from>=nr.from&&rng.to<=nr.to);
        });
        cks.sort((a,b)=>(extractRange(a.name)?.from||0)-(extractRange(b.name)?.from||0));
        if(cks.length>0){
          legendItems.push({name:typeName,bg:color.bg});
          const maxLayers=Math.max(...cks.map(ck=>ck.stages.length));
          const groupStartRow=excelData.length;
          for(let row=0;row<maxLayers;row++){
            const colRanges=[];
            for(const ck of cks){
              const ckRange=extractRange(ck.name);if(!ckRange)continue;
              const layerNum=ck.stages.length-row;if(layerNum<1)continue;
              const k=rfiKey(typeName,ckRange.from,ckRange.to),rfi=rfiMap[k]?.[layerNum];
              colRanges.push({from:ckRange.from,to:ckRange.to,bg:color.bg,fg:color.fg,fill:color.fill,content:cellLabel(rfi)});
            }
            let tr='<tr>';
            if(row===0)tr+='<td class="rl-group" style="background:'+color.bg+';color:'+color.fg+'" rowspan="'+maxLayers+'">'+typeName.replace(/&/g,'&amp;')+'</td>';
            tr+=buildRowCells(colRanges,TOTAL,chartFrom,SUB)+'</tr>';
            body+=tr;
            excelData.push({rowLabel:row===0?typeName:'',labelFill:color.fill,labelFg:color.fg,cells:buildCellArray(colRanges,TOTAL,chartFrom,SUB)});
          }
          // Merge grouped row label in Excel
          if(maxLayers>1) excelMerges.push({s:{r:4+groupStartRow,c:0},e:{r:4+groupStartRow+maxLayers-1,c:0}});
        }
      } else {
        // Simple rendering — match j1 checkpoints by name
        const cks=Object.values(ckById).filter(ck=>ck.name.trim().toLowerCase()===typeName.trim().toLowerCase());
        if(cks.length>0){
          legendItems.push({name:typeName,bg:color.bg});
          body+=renderSimpleRows(cks,color,nomRanges,typeName);
        }
      }
    }

    document.getElementById('chart-body').innerHTML=body;
    const legendEl=document.getElementById('legend');
    legendEl.innerHTML='<span class="lg-lbl">Colour Code &#8594;</span>';
    for(const item of legendItems){
      const span=document.createElement('span');span.className='lg-item';
      span.innerHTML='<span class="lg-sw" style="background:'+item.bg+'"></span> '+item.name;
      legendEl.appendChild(span);
    }
    loadingEl.style.display='none';
    tableEl.style.display='';
    exportBtn.style.display='flex';
    statusEl.className='';
    statusEl.textContent='Live from Metabase \u2014 Last refreshed: '+new Date().toLocaleTimeString('en-IN')+' (auto-refresh: 5 min)';
  } catch(err){
    console.error(err);
    loadingEl.innerHTML='<span style="color:#c00;font-size:12px">&#9888; Failed to load: '+err.message+'</span>';
    statusEl.className='err';
    statusEl.textContent='Data unavailable';
  }
}
main();
setInterval(main,5*60*1000);
</script>
</body>
</html>
