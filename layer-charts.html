<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer Charts — digiQC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --brand:#2c5f8a; --bg:#f0f2f5; --card:#fff; --border:#e0e0e0; --sub:#666; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:#1a1a2e; }
.header { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:12px; }
.logo { font-size:20px; font-weight:800; letter-spacing:-0.5px; }
.header-sep { opacity:0.3; font-size:20px; }
.header-title { font-size:15px; font-weight:500; opacity:0.85; }
.header-right { margin-left:auto; display:flex; gap:8px; align-items:center; }
.header-btn { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.25); padding:7px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:background 0.2s; }
.header-btn:hover { background:rgba(255,255,255,0.25); }
.header-btn.primary { background:#2c5f8a; border-color:#2c5f8a; }
.header-btn.primary:hover { background:#1e4a73; }
.container { max-width:1100px; margin:24px auto; padding:0 20px; }
.org-section { margin-bottom:32px; }
.org-name { font-size:14px; font-weight:700; color:var(--brand); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid var(--brand); }
.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; transition:box-shadow 0.2s,transform 0.2s; display:flex; flex-direction:column; gap:10px; }
.card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.1); transform:translateY(-2px); }
.card.inactive { opacity:0.5; }
.card-title { font-size:15px; font-weight:700; color:#1a1a2e; }
.card-meta { display:flex; flex-wrap:wrap; gap:8px; font-size:11px; }
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:600; }
.badge-side { background:#E8F5E9; color:#2E7D32; }
.badge-dir { background:#E3F2FD; color:#1565C0; }
.badge-block { background:#FFF3E0; color:#E65100; }
.badge-inactive { background:#FFEBEE; color:#C62828; }
.card-actions { display:flex; gap:8px; margin-top:auto; align-items:center; }
.card-link { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; background:var(--brand); color:#fff; text-decoration:none; font-size:12px; font-weight:600; transition:background 0.2s; }
.card-link:hover { background:#1e4a73; }
.card-link svg { width:14px; height:14px; fill:#fff; }
.edit-btn { display:inline-flex; align-items:center; gap:5px; padding:8px 14px; border-radius:6px; background:#fff; border:1px solid var(--border); color:var(--sub); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.edit-btn:hover { border-color:var(--brand); color:var(--brand); }
.loading { text-align:center; padding:60px; color:var(--sub); font-size:14px; }
.empty { text-align:center; padding:60px; color:var(--sub); }

/* Modal */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#fff; border-radius:12px; width:520px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#fff; border-radius:12px 12px 0 0; z-index:1; }
.modal-header h3 { font-size:15px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--sub); padding:4px 8px; }
.modal-body { padding:20px; display:flex; flex-direction:column; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:11px; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:0.3px; }
.form-group input, .form-group select { padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; }
.form-group input:focus, .form-group select:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 2px rgba(44,95,138,0.15); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-section { font-size:11px; font-weight:700; color:var(--brand); text-transform:uppercase; letter-spacing:0.5px; margin-top:6px; padding-bottom:4px; border-bottom:1px solid #eee; }
.modal-footer { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
.btn { padding:8px 18px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; border:1px solid var(--border); background:#fff; color:var(--sub); transition:all 0.2s; }
.btn:hover { border-color:#999; }
.btn.primary { background:var(--brand); color:#fff; border-color:var(--brand); }
.btn.primary:hover { background:#1e4a73; }
.btn.danger { background:#fff; color:#C62828; border-color:#E57373; }
.btn.danger:hover { background:#FFEBEE; }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1a1a2e; color:#fff; padding:10px 20px; border-radius:8px; font-size:12px; font-weight:500; z-index:2000; display:none; }
.toast.show { display:block; }
.toast.error { background:#C62828; }
.toggle-row { display:flex; align-items:center; gap:10px; }
.toggle { position:relative; width:36px; height:20px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#ccc; border-radius:10px; cursor:pointer; transition:0.2s; }
.toggle-slider:before { content:''; position:absolute; height:14px; width:14px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.2s; }
.toggle input:checked+.toggle-slider { background:var(--brand); }
.toggle input:checked+.toggle-slider:before { transform:translateX(16px); }
</style>
</head>
<body>
<div class="header">
  <span class="logo">digiQC</span>
  <span class="header-sep">|</span>
  <span class="header-title">Layer Charts</span>
  <div class="header-right">
    <button class="header-btn primary" onclick="openAddModal()">+ Add Project</button>
  </div>
</div>
<div class="container" id="container">
  <div class="loading">Loading projects...</div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Add Project</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Organisation Name</label>
        <input type="text" id="fOrg" placeholder="e.g. GR INFRAPROJECTS LTD.">
      </div>
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="fName" placeholder="e.g. Meerut - Prayagraj Expressway">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Side</label>
          <select id="fSide"><option value="RHS">RHS</option><option value="LHS">LHS</option></select>
        </div>
        <div class="form-group">
          <label>Active</label>
          <div class="toggle-row" style="margin-top:4px;">
            <label class="toggle"><input type="checkbox" id="fActive" checked><span class="toggle-slider"></span></label>
            <span style="font-size:12px;color:var(--sub)" id="fActiveLabel">Yes</span>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Direction Left</label>
          <input type="text" id="fDirL" placeholder="e.g. Meerut">
        </div>
        <div class="form-group">
          <label>Direction Right</label>
          <input type="text" id="fDirR" placeholder="e.g. Prayagraj">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Chainage Block Size (m)</label>
          <input type="number" id="fBlock" value="100" min="10">
        </div>
        <div class="form-group">
          <label>Sub-Division Size (m)</label>
          <input type="number" id="fSub" value="10" min="1">
        </div>
      </div>
      <div class="form-section">Metabase Card UUIDs</div>
      <div class="form-row">
        <div class="form-group">
          <label>J1 (Checkpoints)</label>
          <input type="text" id="fJ1" placeholder="UUID">
        </div>
        <div class="form-group">
          <label>J2 (Levels)</label>
          <input type="text" id="fJ2" placeholder="UUID">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>J3 (Config)</label>
          <input type="text" id="fJ3" placeholder="UUID">
        </div>
        <div class="form-group">
          <label>J4 (RFIs)</label>
          <input type="text" id="fJ4" placeholder="UUID">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn danger" id="deleteBtn" onclick="deleteProject()" style="margin-right:auto;display:none">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="saveBtn" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DASH_OWNER='Hathi-Jigar',DASH_REPO='support-dashboard';
let allProjects=[],projectsSha=null,editingIndex=-1;

function getToken(){return localStorage.getItem('support_token')}
function showToast(msg,isErr){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(isErr?' error':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function slugify(name,side){
  return (name+'-'+side).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

// ── Load & Render ──
async function loadProjects(){
  try{
    const res=await fetch(`https://api.github.com/repos/${DASH_OWNER}/${DASH_REPO}/contents/projects.json`,{
      headers:{'Accept':'application/vnd.github.v3+json',...(getToken()?{'Authorization':'token '+getToken()}:{})}
    });
    if(res.ok){
      const data=await res.json();
      projectsSha=data.sha;
      const parsed=JSON.parse(decodeURIComponent(escape(atob(data.content))));
      allProjects=parsed.projects||[];
    } else {
      // Fallback: fetch static file
      const r2=await fetch('projects.json?t='+Date.now());
      const parsed=await r2.json();
      allProjects=parsed.projects||[];
    }
  }catch(e){
    const r2=await fetch('projects.json?t='+Date.now());
    const parsed=await r2.json();
    allProjects=parsed.projects||[];
  }
  render();
}

function render(){
  const container=document.getElementById('container');
  if(!allProjects.length){container.innerHTML='<div class="empty">No projects configured. Click <b>+ Add Project</b> to get started.</div>';return;}

  const byOrg={};
  for(const p of allProjects){
    const org=p.org||'Other';
    if(!byOrg[org])byOrg[org]=[];
    byOrg[org].push(p);
  }

  let html='';
  for(const org of Object.keys(byOrg).sort()){
    html+='<div class="org-section">';
    html+='<div class="org-name">'+org+'</div>';
    html+='<div class="cards">';
    for(const p of byOrg[org]){
      const idx=allProjects.indexOf(p);
      const inactive=p.active===false?' inactive':'';
      html+='<div class="card'+inactive+'">';
      html+='<div class="card-title">'+p.projectName+'</div>';
      html+='<div class="card-meta">';
      html+='<span class="badge badge-side">'+p.side+'</span>';
      html+='<span class="badge badge-dir">'+(p.dirLeft||'')+' &#8594; '+(p.dirRight||'')+'</span>';
      html+='<span class="badge badge-block">Block: '+(p.chainageBlockSize||100)+'m / Sub: '+(p.subDivisionSize||10)+'m</span>';
      if(p.active===false) html+='<span class="badge badge-inactive">Inactive</span>';
      html+='</div>';
      html+='<div class="card-actions">';
      if(p.active!==false){
        html+='<a class="card-link" href="layer_chart.html?project='+encodeURIComponent(p.slug)+'">';
        html+='<svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>';
        html+='View Chart</a>';
      }
      html+='<button class="edit-btn" onclick="openEditModal('+idx+')">&#9998; Edit</button>';
      html+='</div>';
      html+='</div>';
    }
    html+='</div></div>';
  }
  container.innerHTML=html;
}

// ── Modal ──
function openAddModal(){
  if(!getToken()){showToast('Login on the Support Dashboard first to get an access token',true);return;}
  editingIndex=-1;
  document.getElementById('modalTitle').textContent='Add Project';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('fOrg').value='';
  document.getElementById('fName').value='';
  document.getElementById('fSide').value='RHS';
  document.getElementById('fActive').checked=true;
  document.getElementById('fActiveLabel').textContent='Yes';
  document.getElementById('fDirL').value='';
  document.getElementById('fDirR').value='';
  document.getElementById('fBlock').value='100';
  document.getElementById('fSub').value='10';
  document.getElementById('fJ1').value='';
  document.getElementById('fJ2').value='';
  document.getElementById('fJ3').value='';
  document.getElementById('fJ4').value='';
  document.getElementById('modalBg').classList.add('open');
}

function openEditModal(idx){
  if(!getToken()){showToast('Login on the Support Dashboard first to get an access token',true);return;}
  editingIndex=idx;
  const p=allProjects[idx];
  document.getElementById('modalTitle').textContent='Edit Project';
  document.getElementById('deleteBtn').style.display='';
  document.getElementById('fOrg').value=p.org||'';
  document.getElementById('fName').value=p.projectName||'';
  document.getElementById('fSide').value=p.side||'RHS';
  document.getElementById('fActive').checked=p.active!==false;
  document.getElementById('fActiveLabel').textContent=p.active!==false?'Yes':'No';
  document.getElementById('fDirL').value=p.dirLeft||'';
  document.getElementById('fDirR').value=p.dirRight||'';
  document.getElementById('fBlock').value=p.chainageBlockSize||100;
  document.getElementById('fSub').value=p.subDivisionSize||10;
  document.getElementById('fJ1').value=p.metabase?.j1||'';
  document.getElementById('fJ2').value=p.metabase?.j2||'';
  document.getElementById('fJ3').value=p.metabase?.j3||'';
  document.getElementById('fJ4').value=p.metabase?.j4||'';
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
}

// Toggle label
document.getElementById('fActive').addEventListener('change',function(){
  document.getElementById('fActiveLabel').textContent=this.checked?'Yes':'No';
});

// ── Save ──
async function saveProject(){
  const org=document.getElementById('fOrg').value.trim();
  const name=document.getElementById('fName').value.trim();
  const side=document.getElementById('fSide').value;
  const active=document.getElementById('fActive').checked;
  const dirL=document.getElementById('fDirL').value.trim();
  const dirR=document.getElementById('fDirR').value.trim();
  const block=parseInt(document.getElementById('fBlock').value)||100;
  const sub=parseInt(document.getElementById('fSub').value)||10;
  const j1=document.getElementById('fJ1').value.trim();
  const j2=document.getElementById('fJ2').value.trim();
  const j3=document.getElementById('fJ3').value.trim();
  const j4=document.getElementById('fJ4').value.trim();

  if(!org||!name){showToast('Organisation and Project Name are required',true);return;}
  if(!j1||!j2||!j3||!j4){showToast('All 4 Metabase UUIDs are required',true);return;}

  const slug=slugify(name,side);
  const project={slug,org,projectName:name,side,dirLeft:dirL,dirRight:dirR,chainageBlockSize:block,subDivisionSize:sub,metabase:{j1,j2,j3,j4},active};

  if(editingIndex>=0){
    allProjects[editingIndex]=project;
  } else {
    if(allProjects.some(p=>p.slug===slug)){showToast('A project with this name and side already exists',true);return;}
    allProjects.push(project);
  }

  document.getElementById('saveBtn').disabled=true;
  document.getElementById('saveBtn').textContent='Saving...';
  const ok=await pushProjects('Update project: '+name+' ('+side+')');
  document.getElementById('saveBtn').disabled=false;
  document.getElementById('saveBtn').textContent='Save';

  if(ok){closeModal();render();showToast('Project saved');}
}

// ── Delete ──
async function deleteProject(){
  if(editingIndex<0)return;
  const p=allProjects[editingIndex];
  if(!confirm('Delete "'+p.projectName+' ('+p.side+')"? This cannot be undone.'))return;

  allProjects.splice(editingIndex,1);
  const ok=await pushProjects('Delete project: '+p.projectName+' ('+p.side+')');
  if(ok){closeModal();render();showToast('Project deleted');}
}

// ── Push to GitHub ──
async function pushProjects(commitMsg){
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify({projects:allProjects},null,2))));
    const body={message:commitMsg,content,branch:'main'};
    if(projectsSha)body.sha=projectsSha;
    const res=await fetch(`https://api.github.com/repos/${DASH_OWNER}/${DASH_REPO}/contents/projects.json`,{
      method:'PUT',
      headers:{'Authorization':'token '+getToken(),'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!res.ok){const e=await res.json();throw new Error(e.message||'HTTP '+res.status);}
    const d=await res.json();
    projectsSha=d.content.sha;
    return true;
  }catch(e){
    showToast('Save failed: '+e.message,true);
    await loadProjects(); // Reload to restore state
    return false;
  }
}

loadProjects();
</script>
</body>
</html>
